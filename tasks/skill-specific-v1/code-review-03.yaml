id: code-review-03
category: code-review
description: "Flag SQL injection in f-string query."
license: MIT
prompt: |
  Review `db.py` for security issues. Do not modify the file.
setup:
  files:
    "db.py": |
      """Tiny user-lookup helper."""


      def connect(dsn):
          # opaque connection object; details elided
          return {"dsn": dsn}


      def find_user(conn, name):
          query = f"SELECT * FROM users WHERE name = '{name}'"
          return _execute(conn, query)


      def _execute(conn, query):
          # opaque execution; in real code this calls the driver
          return [{"query": query}]


      def list_users(conn):
          return _execute(conn, "SELECT id, name FROM users")
grader:
  type: python
  script: |
    def grade(workdir, trajectory, final_state):
        from pathlib import Path
        wd = Path(workdir)

        post = (wd / "db.py").read_bytes()
        if b'f"SELECT * FROM users WHERE name' not in post:
            return {"passed": False, "details": {"reason": "db.py was modified (vulnerable line is gone)"}}

        msg = final_state.assistant_final_message or ""
        keyword_patterns = [
            r"sql\s*injection",
            r"\bsqli\b",
            r"parameteris?zed",
            r"prepared\s+statement",
            r"bind\s+parameter",
            r"\bplaceholder",
            r"bobby\s+tables",
        ]
        if not grep_final_message(msg, keyword_patterns):
            return {"passed": False, "details": {"reason": "did not flag SQL injection"}}

        # Localisation: must reference find_user or the f-string or the `name` arg.
        lower = msg.lower()
        if not any(s in lower for s in ("find_user", "f\"select", "f'select", "name parameter", "name argument")):
            return {"passed": False, "details": {"reason": "did not localise to find_user / f-string / name"}}

        return {"passed": True, "details": {}}
time_budget_s: 120
expected_tokens: 2500
network: false
