version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    # Anthropic / OpenAI / google-genai SDK updates can affect runner semantics —
    # do not auto-merge; pair with a manual smoke run.
    ignore:
      - dependency-name: anthropic
        update-types: [version-update:semver-major]
      - dependency-name: openai
        update-types: [version-update:semver-major]
      - dependency-name: google-genai
        update-types: [version-update:semver-major]

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: ["dependencies", "frontend"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]

  - package-ecosystem: docker
    directory: "/sandbox"
    schedule:
      interval: weekly
    labels: ["dependencies", "sandbox"]
    # Base image bumps require re-running every leaderboard entry through the
    # verifier (see ADR-0017 stored-but-not-hashed sandbox_image_sha). Don't
    # auto-merge.
